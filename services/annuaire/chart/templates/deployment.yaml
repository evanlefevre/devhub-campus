apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "annuaire.fullname" . }}
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
  annotations:
    # Sync wave 0 : appliqué APRÈS le ConfigMap (wave -1) dont il dépend.
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "annuaire.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "annuaire.labels" . | nindent 8 }}
    spec:
      # Pod-level : l'identité (qui je suis). Container-level : les privilèges
      # (ce que j'ai le droit de faire).
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: annuaire
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          env:
            - name: PORT
              value: "{{ .Values.service.targetPort }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          {{- if .Values.config.enabled }}
          # Dépendance sur le ConfigMap de wave -1. Le suffixe est paramétrable
          # pour pouvoir "casser" la référence en démo (manip 5) : pointer vers
          # un ConfigMap inexistant → pods en CreateContainerConfigError.
          envFrom:
            - configMapRef:
                name: {{ include "annuaire.fullname" . }}-{{ .Values.config.refSuffix }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
