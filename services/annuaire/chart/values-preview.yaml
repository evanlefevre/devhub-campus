# Surcharges pour les environnements de preview (étape 7).
# L'ApplicationSet va probablement surcharger `ingress.host` à la volée par branche
# via `parameters` — réfléchissez à ce qu'il faut laisser ici vs. surcharger.

# DÉMO ÉTAPE 7 : changement visible propre à la branche feature/demo-prof.
# La preview tournera avec 3 répliques là où le dev en a 2 — visible d'un
# coup d'œil dans l'arbre ArgoCD de la preview.
replicaCount: 3
ingress:
  enabled: true
  # le vrai host sera injecté par l'ApplicationSet à la volée.
  host: preview.devhub.local
env:
  LOG_LEVEL: debug
# Marque toutes les ressources de preview pour les lister d'un coup :
#   kubectl get all -A -l devhub.io/env=preview
extraLabels:
  devhub.io/env: preview
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 96Mi
image:
  tag: 7ef6719
