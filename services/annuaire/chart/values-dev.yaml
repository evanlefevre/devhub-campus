# Surcharges pour l'environnement de développement (namespace devhub-dev).
# Ne mettez ICI que ce qui diffère de values.yaml.

ingress:
  enabled: true
  host: annuaire.devhub.local
env:
  LOG_LEVEL: debug
image:
  tag: 7ef6719

# active le hook PreSync de migration en dev (étape 8, manip 4).
migration:
  enabled: true

# active le ConfigMap de sync-wave en dev (étape 8, manip 5).
# refSuffix cassé volontairement : le Deployment référence un ConfigMap
# inexistant (annuaire-dev-annuaire-missing) → pods CreateContainerConfigError.
config:
  enabled: true
  banner: "DevHub Campus - dev"
  refSuffix: missing
# replicaCount hérité de values.yaml (2) — utile pour observer le selfHeal
# de l'étape 8 (scale à 5 → ArgoCD redescend à 2).
