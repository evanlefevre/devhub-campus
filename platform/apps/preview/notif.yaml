# ApplicationSet : notif — previews par branche (étape 7).
# Même generator que annuaire-preview (pullRequest GitHub) ; voir la
# justification détaillée dans platform/apps/preview/annuaire.yaml.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: notif-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: evanlefevre
          repo: devhub-campus
          tokenRef:
            secretName: github-token
            key: token
        filters:
          - branchMatch: ^feature/.*
        requeueAfterSeconds: 60

  template:
    metadata:
      name: notif-preview-{{.branch_slug}}
      labels:
        devhub.io/env: preview
        devhub.io/service: notif
    spec:
      project: devhub
      source:
        repoURL: https://github.com/evanlefevre/devhub-campus.git
        targetRevision: '{{.branch}}'
        path: services/notif/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: notif-{{.branch_slug}}.devhub.local
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{.branch_slug}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
