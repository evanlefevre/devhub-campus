# ApplicationSet : annuaire — previews par branche (étape 7).
#
# Generator retenu : pullRequest (GitHub).
#   Justification (RAPPORT.md) :
#   1. Le generator scmProvider github interroge l'endpoint /orgs/<x>/repos,
#      qui renvoie 404 pour un compte PERSONNEL (evanlefevre n'est pas une org).
#      pullRequest interroge /repos/<owner>/<repo>/pulls → fonctionne pour un user.
#   2. Une preview adossée à une PR ouverte est le pattern "review app" standard :
#      elle naît à l'ouverture de la PR et disparaît (prune) à sa fermeture.
#   3. Le squelette du TP était déjà calibré pour ce generator ({{branch_slug}}).
#
# Doc : https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Pull-Request/

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: evanlefevre
          repo: devhub-campus
          tokenRef:
            secretName: github-token
            key: token
        # ne matérialiser que les PR issues de branches feature/*.
        filters:
          - branchMatch: ^feature/.*
        requeueAfterSeconds: 60

  template:
    metadata:
      # branch_slug : slashes → tirets, minuscules → nom K8s valide.
      # feature/demo-prof → feature-demo-prof
      name: annuaire-preview-{{.branch_slug}}
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire
    spec:
      project: devhub
      source:
        repoURL: https://github.com/evanlefevre/devhub-campus.git
        # suit la tête de la branche de la PR : un push met à jour la preview.
        targetRevision: '{{.branch}}'
        path: services/annuaire/chart
        helm:
          valueFiles:
            - values-preview.yaml
          # chaque preview a son hôte propre : annuaire-<branche>.devhub.local
          parameters:
            - name: ingress.host
              value: annuaire-{{.branch_slug}}.devhub.local
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{.branch_slug}}
      syncPolicy:
        automated:
          prune: true       # IMPORTANT : sans prune, les previews ne se nettoient jamais.
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
