# Values Helm pour installer ArgoCD lui-même (chart argo/argo-cd).
# Ce fichier est consommé par `make argocd-install`.
#
# Doc du chart : https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
#
# Expose l'UI via l'ingress-nginx (host argocd.devhub.local) + étape 9 :
# RBAC, notifications sur échec de sync, métriques Prometheus.

global:
  domain: argocd.devhub.local

configs:
  params:
    # désactive le TLS interne — l'ingress-nginx est devant pour le HTTP.
    server.insecure: true
  cm:
    timeout.reconciliation: 180s
    # Compte local non-admin pour tester le RBAC (étape 9). login = accès UI/CLI,
    # apiKey = génération de token. Mot de passe défini via `argocd account
    # update-password --account developer`.
    accounts.developer: "apiKey, login"

  # RBAC ArgoCD (étape 9). Syntaxe : p, <sujet>, <ressource>, <action>, <objet>, allow|deny
  # Le matching des objets est en glob (pas regex POSIX).
  # Réf : https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
  rbac:
    # tout utilisateur non mappé n'a aucun droit par défaut.
    policy.default: ""
    scopes: "[groups]"
    policy.csv: |
      # developer : VOIT toutes les Applications du projet devhub…
      p, role:developer, applications, get, devhub/*, allow
      p, role:developer, projects, get, devhub, allow
      # …mais ne peut SYNC que celles dont le nom contient "annuaire" (son service).
      p, role:developer, applications, sync, devhub/*annuaire*, allow
      # platform-admin : tous les droits sur le projet devhub.
      p, role:platform-admin, applications, *, devhub/*, allow
      p, role:platform-admin, projects, *, devhub, allow
      p, role:platform-admin, clusters, get, *, allow
      # bindings des comptes locaux vers les rôles.
      g, developer, role:developer
      g, admin, role:platform-admin

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.devhub.local
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
    tls: false
  # expose /metrics du composant server (étape 9 — observabilité).
  metrics:
    enabled: true

# Notifications (étape 9) : sur un échec de sync, POST un message vers un webhook
# (mocké avec webhook.site). Le contrôleur argocd-notifications lit ce bloc.
notifications:
  enabled: true
  argocdUrl: https://argocd.devhub.local
  metrics:
    enabled: true
  notifiers:
    service.webhook.devhub: |
      url: https://webhook.site/2f55db79-eb5b-4cbd-8c9f-df5e2dd41e87
      headers:
      - name: Content-Type
        value: application/json
  templates:
    template.app-sync-failed: |
      webhook:
        devhub:
          method: POST
          body: |
            {
              "application": "{{.app.metadata.name}}",
              "revision": "{{.app.status.operationState.operation.sync.revision}}",
              "phase": "{{.app.status.operationState.phase}}",
              "message": "{{.app.status.operationState.message}}"
            }
  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
  # abonnement par défaut : toutes les Applications notifient ce webhook en cas d'échec.
  subscriptions:
    - recipients:
        - webhook:devhub
      triggers:
        - on-sync-failed

# Métriques Prometheus (étape 9). Chaque composant expose un endpoint /metrics.
controller:
  metrics:
    enabled: true
  resources:
    requests: { cpu: "50m", memory: "256Mi" }
    limits:   { cpu: "1",   memory: "1Gi" }

repoServer:
  metrics:
    enabled: true
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

applicationSet:
  metrics:
    enabled: true
